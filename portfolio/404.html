<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Vibhath T K</title>
  
  <!-- Google Fonts - Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #F0F0F3;
      --text-color: #333333;
      --text-muted: #666666;
      --accent-red: #D32F2F;
      
      --shadow-light: #ffffff;
      --shadow-dark: #D1D9E6;
      
      --neo-raised-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
      --neo-inset-shadow: inset 9px 9px 16px var(--shadow-dark), inset -9px -9px 16px var(--shadow-light);
      --neo-btn-raised: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
      --neo-btn-inset: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
      
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Outfit', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* WebGL Background Canvas */
    #webgl-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
    }

    /* Card container */
    .sky-door-card {
      width: 400px;
      text-align: center;
      perspective: 1400px;
      padding: 40px 30px;
      background-color: var(--bg-color);
      border-radius: 30px;
      box-shadow: var(--neo-raised-shadow);
      z-index: 10;
    }

    /* Title and description */
    .door-title {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--accent-red);
      letter-spacing: 1px;
    }
    
    .door-description {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 30px;
      line-height: 1.5;
    }

    /* Double door container */
    .sky-door {
      width: 100%;
      height: 220px;
      position: relative;
      margin-bottom: 25px;
      perspective: 1200px;
      cursor: pointer;
    }

    /* Door panels */
    .door-left,
    .door-right {
      width: 50%;
      height: 100%;
      background: linear-gradient(145deg, #d32f2f, #b71c1c);
      border: 3px solid #9e1a1a;
      border-radius: 8px;
      position: absolute;
      top: 0;
      transition:
        transform 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55),
        box-shadow 0.5s;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      z-index: 2;
    }

    /* Left door opens to the left */
    .door-left {
      left: 0;
      transform-origin: left center;
      border-right: 1.5px solid #9e1a1a;
    }

    /* Right door opens to the right */
    .door-right {
      right: 0;
      transform-origin: right center;
      border-left: 1.5px solid #9e1a1a;
    }

    /* Hover: swing doors open */
    .sky-door:hover .door-left {
      transform: rotateY(-125deg);
      box-shadow:
        inset 0 0 30px rgba(0, 0, 0, 0.3),
        0 15px 30px rgba(0, 0, 0, 0.2);
    }
    .sky-door:hover .door-right {
      transform: rotateY(125deg);
      box-shadow:
        inset 0 0 30px rgba(0, 0, 0, 0.3),
        0 15px 30px rgba(0, 0, 0, 0.2);
    }

    /* Door handles */
    .door-handle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
      border: 1px solid #8b6914;
      box-shadow:
        inset -2px -2px 4px rgba(0, 0, 0, 0.3),
        2px 2px 4px rgba(0, 0, 0, 0.2);
      animation: handle-shine 3s infinite alternate;
    }

    /* Handle positions */
    .door-left .door-handle {
      right: 12px;
    }
    .door-right .door-handle {
      left: 12px;
    }

    /* Handle shine animation */
    @keyframes handle-shine {
      0% {
        box-shadow:
          inset -2px -2px 4px rgba(0, 0, 0, 0.3),
          2px 2px 4px rgba(0, 0, 0, 0.2);
      }
      50% {
        box-shadow:
          inset -1px -1px 6px rgba(255, 255, 200, 0.5),
          2px 2px 5px rgba(0, 0, 0, 0.3);
      }
      100% {
        box-shadow:
          inset -2px -2px 4px rgba(0, 0, 0, 0.3),
          2px 2px 4px rgba(0, 0, 0, 0.2);
      }
    }

    /* Door content: message + buttons */
    .door-content {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 25px;
      opacity: 0;
      transform: translateY(15px) scale(0.95);
      transition:
        opacity 0.6s ease 0.4s,
        transform 0.6s ease 0.4s;
    }

    /* Door message */
    .door-message {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-color);
      text-align: center;
    }

    /* Show content when hovering doors */
    .sky-door:hover .door-content {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Buttons */
    .action-buttons {
      display: flex;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 28px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      background-color: var(--bg-color);
      color: var(--accent-red);
      box-shadow: var(--neo-raised-shadow);
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .btn:hover {
      transform: translate3d(0, -3px, 0);
      color: var(--accent-red);
    }
    
    .btn:active {
      transform: translate3d(0, 0, 0);
      box-shadow: var(--neo-inset-shadow);
    }
  </style>
</head>
<body>

  <!-- WebGL Background Canvas -->
  <canvas id="webgl-canvas"></canvas>

  <div class="sky-door-card">
    <div class="door-title">Oops! You’re lost…</div>
    <div class="door-description">Home is just beyond these doors</div>

    <div class="sky-door">
      <div class="door-left">
        <div class="door-handle"></div>
      </div>
      <div class="door-right">
        <div class="door-handle"></div>
      </div>

      <div class="door-content">
        <div class="door-message">Take the safe path forward</div>
        <div class="action-buttons">
          <a href="/" class="btn">Go Home</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Three.js for 3D Background -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('webgl-canvas');
      if (!canvas) return;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 4.5;

      const renderer = new THREE.WebGLRenderer({
        canvas: canvas,
        alpha: true,
        antialias: true
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      // Geometry
      const radius = window.innerWidth < 768 ? 1.6 : 2.5;
      const geometry = new THREE.IcosahedronGeometry(radius, 1);

      // Material
      const material = new THREE.MeshBasicMaterial({
        color: 0xD32F2F,
        wireframe: true,
        transparent: true,
        opacity: 0.12
      });

      const icosahedron = new THREE.Mesh(geometry, material);
      scene.add(icosahedron);

      // --- Neon Rain Setup ---
      const rainCount = 100;
      const rainPositions = new Float32Array(rainCount * 6);
      const rainSpeeds = [];
      const rainLengths = [];

      for (let i = 0; i < rainCount; i++) {
        const x = (Math.random() - 0.5) * 15;
        const y = Math.random() * 20 - 10;
        const z = (Math.random() - 0.5) * 8;
        const len = 0.15 + Math.random() * 0.25;
        const speed = 0.08 + Math.random() * 0.12;
        
        rainSpeeds.push(speed);
        rainLengths.push(len);

        rainPositions[i * 6] = x;
        rainPositions[i * 6 + 1] = y;
        rainPositions[i * 6 + 2] = z;
        rainPositions[i * 6 + 3] = x;
        rainPositions[i * 6 + 4] = y - len;
        rainPositions[i * 6 + 5] = z;
      }

      const rainGeometry = new THREE.BufferGeometry();
      rainGeometry.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));

      const rainMaterial = new THREE.LineBasicMaterial({
        color: 0xD32F2F,
        transparent: true,
        opacity: 0.22
      });

      const rain = new THREE.LineSegments(rainGeometry, rainMaterial);
      scene.add(rain);

      const clock = new THREE.Clock();
      
      function animate() {
        requestAnimationFrame(animate);
        const elapsedTime = clock.getElapsedTime();
        icosahedron.rotation.y = elapsedTime * 0.04;
        icosahedron.rotation.x = elapsedTime * 0.02;

        // Update Neon Rain Positions
        const positions = rainGeometry.attributes.position.array;
        for (let i = 0; i < rainCount; i++) {
          let y1 = positions[i * 6 + 1];
          let y2 = positions[i * 6 + 4];
          
          y1 -= rainSpeeds[i];
          y2 -= rainSpeeds[i];
          
          if (y1 < -10) {
            const x = (Math.random() - 0.5) * 15;
            y1 = 10;
            y2 = 10 - rainLengths[i];
            const z = (Math.random() - 0.5) * 8;
            
            positions[i * 6] = x;
            positions[i * 6 + 2] = z;
            positions[i * 6 + 3] = x;
            positions[i * 6 + 5] = z;
          }
          
          positions[i * 6 + 1] = y1;
          positions[i * 6 + 4] = y2;
        }
        rainGeometry.attributes.position.needsUpdate = true;

        renderer.render(scene, camera);
      }
      
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        const newRadius = window.innerWidth < 768 ? 1.6 : 2.5;
        icosahedron.geometry.dispose();
        icosahedron.geometry = new THREE.IcosahedronGeometry(newRadius, 1);
      });
    });
  </script>
</body>
</html>
